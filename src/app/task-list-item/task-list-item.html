<div
  class="task-row"
  [class.overdue]="isOverdue(task)"
  [class.is-subtask]="isSubtask"
  [style.--label-color]="labelStripColor()"
  (click)="cycleProgress($event)"
  (contextmenu)="onRowContextMenu($event)"
>
  <div
    class="label-strip"
    [class.label-strip--with-toggle]="showSubtasksToggle"
    [style.background-color]="labelStripColor()"
    (click)="$event.stopPropagation()"
  >
    @if (showSubtasksToggle) {
      <button
        type="button"
        class="subtasks-toggle"
        [attr.aria-expanded]="hasSubtasks ? subtasksExpanded : null"
        [attr.aria-label]="
          !hasSubtasks
            ? '子タスクを追加'
            : subtasksExpanded
              ? '子タスクを格納'
              : '子タスクを表示'
        "
        (click)="onSubtasksToggleClick($event)"
      >
        {{ !hasSubtasks ? '▽' : subtasksExpanded ? '▲' : '▼' }}
      </button>
    }
  </div>
  @if (showDragHandle) {
    <button
      type="button"
      class="drag-handle"
      cdkDragHandle
      aria-label="ドラッグして並び替え"
      (click)="$event.stopPropagation()"
    >
      <mat-icon aria-hidden="true">drag_indicator</mat-icon>
    </button>
  }
  <div
    class="task-main"
    [class.done]="task.status === 'done'"
    [class.in-progress]="task.status === 'in_progress'"
    (keydown)="onTaskMainKeydown($event)"
    role="button"
    tabindex="0"
    [attr.aria-label]="'進捗を切り替え（現在: ' + statusLabel() + '）: ' + task.title"
  >
    <div class="left">
      <span 
        class="task-status-badge"
        [class.done]="task.status === 'done'"
        [class.in-progress]="task.status === 'in_progress'"
        title="進捗"
      >{{ statusLabel() }}</span>
      <span
        class="priority-mark"
        [class.five]="task.priority === 5"
        [class.four]="task.priority === 4"
        [class.three]="task.priority === 3"
        [class.two]="task.priority === 2"
        [class.one]="task.priority === 1"
      >{{ priorityLabel() }}</span>
      @if (taskScope.kind === 'project' && task.assignee) {
        <span
          class="assignee-icon-wrap"
          [matTooltip]="'担当: ' + assigneeDisplay()"
          matTooltipPosition="above"
        >
          <app-user-avatar
            [userId]="task.assignee!"
            [displayName]="assigneeDisplay()"
            [avatarUrl]="assigneeAvatarUrl()"
            size="sm"
          />
        </span>
      }
      <span
        class="task-title"
        [class.done]="task.status === 'done'"
        [attr.title]="taskTitleTooltip()"
      >{{ taskTitleDisplay() }}</span>
    </div>

    <div class="center">
      @if (task.status !== 'done' && scheduleTagText(task); as sched) {
        <span
          class="deadline-tag"
          [class.deadline-overdue]="isOverdue(task)"
        >{{ sched }}</span>
      }
    </div>

    <div class="actions" (click)="$event.stopPropagation()">
      <button mat-stroked-button type="button" (click)="openDetail($event)">詳細</button>
      <button
        mat-flat-button
        color="warn"
        type="button"
        class="delete-btn"
        (click)="deleteTask($event)"
        aria-label="削除"
      >
        削除
      </button>
    </div>
  </div>
</div>
