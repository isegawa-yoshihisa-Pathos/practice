<h2 mat-dialog-title class="dialog-title-row">
  <span class="dialog-title-text">
    {{ data.dialogMode === 'subtask' ? '子タスクを追加' : 'タスクを追加' }}
  </span>
  <button mat-button type="button" class="dialog-close-btn" (click)="cancel()">閉じる</button>
</h2>
<mat-dialog-content class="dialog-body">
  <app-task-form
    #taskForm
    [taskScope]="data.taskScope"
    [projectMembers]="data.projectMembers"
    [date]="data.date ?? null"
    (addTask)="onAdd($event)"
  ></app-task-form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button
    mat-flat-button
    color="primary"
    type="button"
    (click)="taskForm.submit()"
    (keydown.enter)="taskForm.submit()"
    (keydown.space)="$event.preventDefault(); taskForm.submit()"
    [disabled]="!taskForm.canSubmit()"
  >
    追加
  </button>
</mat-dialog-actions>
