<h2 mat-dialog-title>
  {{ data.dialogMode === 'subtask' ? '子タスクを追加' : 'タスクを追加' }}
</h2>
<mat-dialog-content class="dialog-body">
  <app-task-form
    [taskScope]="data.taskScope"
    [projectMembers]="data.projectMembers"
    (addTask)="onAdd($event)"
  ></app-task-form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">閉じる</button>
</mat-dialog-actions>
