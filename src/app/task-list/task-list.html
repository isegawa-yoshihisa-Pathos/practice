<nz-list nzBordered>
  <nz-list-item *ngFor="let task of tasks" class="{{task.done ? 'done' : ''}}">
    <app-task-list-item [task]="task" [taskScope]="taskScope"></app-task-list-item>
  </nz-list-item>
  <nz-list-item>
    <app-task-form (addTask)="addTask($event)"></app-task-form>
  </nz-list-item>
</nz-list>
