<div class="login">
    <div class="title">Angular-Todo</div>
    <div class="pane">
        <div class="input-container">
            <label class="subtitle">Sign in</label>
            <input type="text" placeholder="username" [(ngModel)]="username">
            <input type="password" placeholder="password" [(ngModel)]="password">
        </div>
        <div class="button-container">
            <button type='submit' (click)="signIn()">Sign in</button>
            <label class="message">Don't have an account?</label>
            <button (click)="makeAccount()">Make account</button>
        </div>
    </div>
</div>
