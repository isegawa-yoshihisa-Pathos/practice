<nz-page-header nzTitle="AngularTodo"></nz-page-header>
<div class="user-window">
  <div class="username">ユーザー名：{{ auth.username() }}</div>
  <button nz-button nzType="primary" (click)="signOut()">Sign out</button>
</div>

<nav class="primary-nav" aria-label="表示の切り替え">
  <div class="nav-cluster nav-cluster-start">
    <button
      type="button"
      class="nav-tab"
      [class.active]="mainTab() === 'private'"
      (click)="selectPrivate()"
    >
      プライベート
    </button>
    @for (p of memberships; track p.projectId) {
      <span class="nav-tab-project-wrap">
        <button
          type="button"
          class="nav-tab nav-tab-project"
          [class.active]="isProjectTabActive(p.projectId)"
          (click)="openProject(p)"
        >
          {{ p.projectName }}
        </button>
        <button
          type="button"
          class="nav-tab-menu"
          [class.active]="isProjectTabActive(p.projectId)"
          aria-label="プロジェクトのメンバー・脱退・削除"
          (click)="openProjectSettings($event, p)"
        >
          <span class="vertical-dots" aria-hidden="true">
            <span class="vdot"></span>
            <span class="vdot"></span>
            <span class="vdot"></span>
          </span>
        </button>
      </span>
    }
  </div>
  <div class="nav-cluster nav-cluster-end">
    <button
      type="button"
      class="nav-tab"
      [class.active]="isProjectHubActive()"
      (click)="selectProjectHub()"
    >
      プロジェクト
    </button>
  </div>
</nav>

@if (mainTab() === 'private') {
  <section class="section">
    <app-task-list [taskScope]="privateScope"></app-task-list>
  </section>
}

@if (mainTab() === 'project') {
  <section class="section project-section">
    @if (!activeProject()) {
      <app-project-hub (projectOpened)="onProjectOpened($event)"></app-project-hub>
    } @else {
      <div class="project-detail">
        <h3 class="project-heading">{{ activeProject()!.name }}</h3>
        <app-task-list [taskScope]="projectTaskScope()"></app-task-list>
      </div>
    }
  </section>
}
