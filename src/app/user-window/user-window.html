<nav class="primary-nav" aria-label="表示の切り替え">
  <div class="nav-cluster nav-cluster-start nav-tabs-host">
    <mat-tab-nav-panel #mainNavPanel class="main-tab-nav-panel">
      <div class="nav-tabs-toolbar">
        <button
          type="button"
          class="multi-cal-btn"
          [class.active]="isProjectHubActive()"
          (click)="selectProjectHub()"
          aria-label="カレンダーを表示"
          matTooltip="カレンダーを表示"
        >
          <mat-icon>calendar_month</mat-icon>
        </button>
        <div class="nav-tabs-scroll-wrap">
        <nav
          mat-tab-nav-bar
          [tabPanel]="mainNavPanel"
          class="sortable-mat-tab-bar"
          mat-stretch-tabs="false"
          cdkDropList
          cdkDropListOrientation="horizontal"
          (cdkDropListDropped)="onNavTabDrop($event)"
        >
        @for (entry of navEntries(); track entry.key) {
          <a
            mat-tab-link
            cdkDrag
            [active]="isEntryActive(entry)"
            (click)="onNavEntryClick(entry, $event)"
            [style.background-color]="tabColorsRaw()[entry.key] || null"
            class="user-window-mat-tab-link"
          >
            <span
              cdkDragHandle
              class="mat-tab-sort-handle"
              (click)="$event.stopPropagation(); $event.preventDefault()"
              aria-label="ドラッグして並び替え"
              tabindex="-1"
            ></span>
            <span class="mat-tab-inner-label" [attr.title]="navTabTitleAttr(entry)">{{
              navTabDisplayLabel(entry)
            }}</span>
            @switch (entry.kind) {
              @case ('privateDefault') {
                <button
                  type="button"
                  matIconButton
                  [matMenuTriggerFor]="defaultPrivateMenu"
                  (click)="$event.stopPropagation(); $event.preventDefault()"
                  aria-label="メニュー"
                >
                  <mat-icon>more_vert</mat-icon>
                </button>
              }
              @case ('privateList') {
                <button
                  type="button"
                  matIconButton
                  [matMenuTriggerFor]="extraPrivateSharedMenu"
                  [matMenuTriggerData]="{
                    pl: { id: entry.id, title: entry.title },
                    tabKey: entry.key,
                  }"
                  (click)="$event.stopPropagation(); $event.preventDefault()"
                  aria-label="メニュー"
                >
                  <mat-icon>more_vert</mat-icon>
                </button>
              }
              @case ('project') {
                <button
                  type="button"
                  matIconButton
                  [matMenuTriggerFor]="projectTabMenu"
                  [matMenuTriggerData]="{ entry: entry }"
                  (click)="$event.stopPropagation(); $event.preventDefault()"
                  aria-label="メニュー"
                >
                  <mat-icon>more_vert</mat-icon>
                </button>
              }
            }
          </a>
        }
        </nav>
        </div>
        <button
          type="button"
          class="nav-add-task-list-btn"
          [class.active]="isProjectHubActive()"
          (click)="selectProjectHub()"
          aria-label="タスクリストを追加"
          matTooltip="タスクリストを追加"
        >
          ＋
        </button>
      </div>

      <mat-menu #defaultPrivateMenu="matMenu">
        <button mat-menu-item type="button" (click)="promptRenameDefaultPrivate()">名称を変更</button>
        <button mat-menu-item type="button" (click)="changeTabColor(tabKeyDefault)">タブの色を設定…</button>
      </mat-menu>
      <mat-menu #extraPrivateSharedMenu="matMenu">
        <ng-template matMenuContent let-pl="pl" let-tabKey="tabKey">
          <button mat-menu-item type="button" (click)="renameExtraPrivate(pl)">名称を変更</button>
          <button mat-menu-item type="button" (click)="changeTabColor(tabKey)">タブの色を設定…</button>
          <mat-divider />
          <button mat-menu-item type="button" class="private-list-delete" (click)="deleteExtraPrivate(pl)">削除</button>
        </ng-template>
      </mat-menu>
      <mat-menu #projectTabMenu="matMenu">
        <ng-template matMenuContent let-entry="entry">
          <button mat-menu-item type="button" (click)="openProjectSettingsFromMenu(entry)">
            プロジェクト設定
          </button>
          <button mat-menu-item type="button" (click)="changeTabColor(entry.key)">タブの色を設定…</button>
        </ng-template>
      </mat-menu>

      <div class="tab-nav-below-content">
        <router-outlet />
      </div>
    </mat-tab-nav-panel>
  </div>
</nav>
